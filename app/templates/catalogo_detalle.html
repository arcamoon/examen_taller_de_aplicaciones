<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ plato.nombre }}</title>
    <style>
        body {
            margin: 0;
            background: #f7f7f4;
            color: #202124;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        a {
            color: #146c43;
            font-weight: 700;
            text-decoration: none;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
            gap: 28px;
            align-items: start;
            margin-top: 18px;
        }

        img,
        .fallback {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            object-fit: cover;
            background: #e5f3eb;
        }

        .fallback {
            display: grid;
            place-items: center;
            color: #146c43;
            font-size: 4rem;
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .category {
            margin: 12px 0 0;
            color: #676b73;
        }

        .price {
            margin: 22px 0;
            color: #146c43;
            font-size: 2rem;
            font-weight: 800;
        }

        .description {
            color: #34373d;
            line-height: 1.7;
        }

        .stock {
            margin-top: 18px;
            color: #676b73;
        }

        @media (max-width: 760px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <a href="{{ url_for('catalogo') }}">Volver al catalogo</a>
        <div class="layout">
            {% if plato.imagen %}
                <img src="{{ plato.imagen }}" alt="{{ plato.nombre }}">
            {% else %}
                <div class="fallback">{{ plato.nombre[:1] }}</div>
            {% endif %}
            <section>
                <h1>{{ plato.nombre }}</h1>
                <p class="category">{{ plato.categoria.nombre }}</p>
                <div class="price">Bs {{ "%.2f"|format(plato.precio_unitario) }}</div>
                <p class="description">{{ plato.descripcion or "Sin descripcion." }}</p>
                <p class="stock">{{ plato.cantidad_disponible }} unidades disponibles</p>
            </section>
        </div>
    </main>
</body>
</html>
