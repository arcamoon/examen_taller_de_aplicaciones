<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingreso de clientes</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f7f7f4;
            color: #202124;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(420px, calc(100% - 32px));
            border: 1px solid #deded8;
            border-radius: 8px;
            background: #fff;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.7rem;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 20px;
            color: #676b73;
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 14px;
        }

        label {
            font-size: .92rem;
            font-weight: 700;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cfcfca;
            border-radius: 6px;
            padding: 11px;
            font: inherit;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 6px;
            padding: 12px;
            background: #146c43;
            color: #fff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        .flash {
            margin-bottom: 14px;
            border-radius: 8px;
            padding: 11px 12px;
            background: #fff3f1;
            color: #9a3412;
        }

        a {
            display: inline-block;
            margin-top: 16px;
            color: #146c43;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Clientes</h1>
        <p>Ingresa para ver el catalogo y crear reservas.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post">
            <div class="field">
                <label for="username">Usuario o correo</label>
                <input id="username" name="username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Contrasena</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>
        <a href="{{ url_for('catalogo') }}">Ver catalogo publico</a>
    </main>
</body>
</html>
