<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registrar Reserva</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <h1 class="text-3xl font-bold mb-6">Registrar Reserva</h1>

      <form method="POST">
        <!-- FECHA -->
        <div class="mb-6">
          <label class="block font-semibold mb-2">Fecha de la reserva</label>
          <input
            type="date"
            name="fecha_reserva"
            required
            class="border rounded-lg p-2 w-full"
          />
        </div>
        <!-- HORA DE LA RESERVA -->
        <div class="mb-6">
          <label class="block font-semibold mb-2">Hora de la reserva</label>

          <input
            type="time"
            name="hora_reserva"
            required
            class="border rounded-lg p-2 w-full"
          />
        </div>

        <!-- PERSONAS -->
        <div class="mb-6">
          <label class="block font-semibold mb-2">Cantidad de personas</label>
          <input
            type="number"
            name="cantidad_personas"
            min="1"
            step="1"
            required
            class="border rounded-lg p-2 w-full"
            placeholder="Ej: 4"
          />
        </div>

        <!-- SELECT PLATOS -->
        <div class="mb-6">
          <label class="block font-semibold mb-2">Agregar plato</label>

          <div class="flex gap-2">
            <select id="platoSelect" class="border rounded-lg p-2 flex-1">
              <option value="">Seleccione un plato</option>
              {% for plato in platos %}
              <option
                value="{{ plato.id_plato }}"
                data-nombre="{{ plato.nombre }}"
                data-precio="{{ plato.precio_unitario }}"
                data-stock="{{ plato.cantidad_disponible }}"
              >
                {{ plato.nombre }} - Bs {{ plato.precio_unitario }} (Stock: {{
                plato.cantidad_disponible }})
              </option>
              {% endfor %}
            </select>

            <button
              type="button"
              onclick="agregarPlato()"
              class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700"
            >
              Agregar
            </button>
          </div>
        </div>

        <!-- TABLA -->
        <div class="overflow-x-auto mt-4">
          <table class="w-full border text-left">
            <thead class="bg-gray-100">
              <tr>
                <th class="p-2 border">Plato</th>
                <th class="p-2 border">Precio</th>
                <th class="p-2 border">Cantidad</th>
                <th class="p-2 border">Subtotal</th>
              </tr>
            </thead>
            <tbody id="lista"></tbody>
          </table>
        </div>

        <!-- TOTAL -->
        <div class="mt-6 flex justify-between items-center">
          <p class="text-xl font-bold">
            Total: Bs <span id="total">0.00</span>
          </p>

          <button
            class="bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700"
          >
            Guardar Reserva
          </button>
        </div>
      </form>
    </div>

    <script>
      let carrito = {};

      function agregarPlato() {
        const select = document.getElementById("platoSelect");
        const option = select.options[select.selectedIndex];

        const id = option.value;
        if (!id) return;

        const nombre = option.dataset.nombre;
        const precio = parseFloat(option.dataset.precio);
        const stock = parseInt(option.dataset.stock);

        if (!carrito[id]) {
          carrito[id] = {
            nombre,
            precio,
            stock,
            cantidad: 1,
          };
        } else {
          if (carrito[id].cantidad + 1 > carrito[id].stock) {
            alert(
              "No puedes exceder el stock disponible (" +
                carrito[id].stock +
                ")",
            );
            return;
          }
          carrito[id].cantidad++;
        }

        render();
      }

      function cambiarCantidad(id, value) {
        const nuevaCantidad = parseInt(value) || 1;

        if (nuevaCantidad > carrito[id].stock) {
          alert("Stock máximo permitido: " + carrito[id].stock);
          render();
          return;
        }

        carrito[id].cantidad = nuevaCantidad;
        render();
      }

      function eliminar(id) {
        delete carrito[id];
        render();
      }

      function render() {
        const tbody = document.getElementById("lista");
        tbody.innerHTML = "";

        let total = 0;

        for (const id in carrito) {
          const item = carrito[id];
          const subtotal = item.precio * item.cantidad;
          total += subtotal;

          tbody.innerHTML += `
            <tr>
              <td class="p-2 border">${item.nombre}</td>
              <td class="p-2 border">Bs ${item.precio.toFixed(2)}</td>

              <td class="p-2 border">
                <input
                  type="number"
                  min="1"
                  max="${item.stock}"
                  value="${item.cantidad}"
                  class="border w-16 text-center rounded"
                  onchange="cambiarCantidad(${id}, this.value)"
                >
              </td>

              <td class="p-2 border font-semibold">
                Bs ${subtotal.toFixed(2)}
              </td>
              <!-- datos para Flask -->
              <input type="hidden" name="platos" value="${id}">
              <input type="hidden" name="cantidad_${id}" value="${item.cantidad}">
            </tr>
          `;
        }

        document.getElementById("total").innerText = total.toFixed(2);
      }
    </script>
  </body>
</html>
