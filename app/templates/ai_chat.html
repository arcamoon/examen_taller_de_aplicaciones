<!doctype html>
<html>
  <head>
    <title>IA Chat</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }
      .box {
        max-width: 600px;
        margin: auto;
      }
      textarea {
        width: 100%;
        height: 100px;
      }
      button {
        padding: 10px;
        margin-top: 10px;
      }
      .response {
        margin-top: 20px;
        padding: 15px;
        background: #f2f2f2;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>🤖 Chat IA (OpenRouter)</h2>

      <form method="POST">
        <textarea name="message" placeholder="Escribe tu pregunta...">
{{ mensaje }}</textarea
        >
        <br />
        <button type="submit">Enviar</button>
      </form>

      {% if respuesta %}
      <div class="response">
        <b>Respuesta:</b><br />
        {{ respuesta }}
      </div>
      {% endif %}
    </div>
  </body>
</html>
